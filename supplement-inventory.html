<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>保健存量 · iHerb 庫存管理</title>
<style>
  :root{
    --mint-50:#eef8f1;
    --mint-100:#dcf1e3;
    --sky-50:#eaf4fb;
    --ink:#233026;
    --ink-soft:#5b6b60;
    --teal:#3fa07c;
    --teal-deep:#2c7a5c;
    --coral:#ef6f5b;
    --coral-soft:#fde4de;
    --amber:#e0a13c;
    --amber-soft:#faedd6;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-border:rgba(255,255,255,0.75);
    --shadow:0 8px 30px rgba(60,90,75,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang TC","Noto Sans TC",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 0%, var(--sky-50) 0%, transparent 55%),
      radial-gradient(circle at 85% 10%, var(--mint-100) 0%, transparent 50%),
      linear-gradient(180deg, #f6faf7 0%, #eef6f1 100%);
    min-height:100vh;
    padding-bottom:110px;
  }
  .topbar{
    position:sticky; top:0; z-index:20;
    padding:18px 20px 14px;
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    background:rgba(246,250,247,0.72);
    border-bottom:1px solid rgba(255,255,255,0.6);
  }
  .topbar h1{
    margin:0; font-size:22px; font-weight:700; letter-spacing:-0.02em;
  }
  .topbar .sub{margin-top:2px; font-size:12.5px; color:var(--ink-soft);}
  .summary-row{
    display:flex; gap:10px; margin-top:14px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:none;
  }
  .summary-row::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(10px);
    border-radius:14px;
    padding:8px 14px;
    font-size:12.5px;
    font-weight:600;
    color:var(--ink-soft);
    display:flex; align-items:center; gap:6px;
    white-space:nowrap;
  }
  .chip b{color:var(--ink); font-size:14px;}
  .chip.alert{background:var(--coral-soft); border-color:rgba(239,111,91,0.3); color:var(--coral);}
  .chip.alert b{color:var(--coral);}

  main{padding:16px 16px 0;}

  .empty-state{
    text-align:center; padding:60px 24px; color:var(--ink-soft);
  }
  .empty-state .icon{font-size:44px; margin-bottom:10px;}
  .empty-state h2{font-size:16px; color:var(--ink); margin:0 0 6px;}
  .empty-state p{font-size:13px; margin:0; line-height:1.6;}

  .section-label{
    font-size:12px; font-weight:700; color:var(--ink-soft);
    letter-spacing:0.04em; margin:18px 4px 10px; text-transform:uppercase;
  }

  .card{
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(16px) saturate(160%);
    -webkit-backdrop-filter:blur(16px) saturate(160%);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:14px 14px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
    transition:transform .15s ease;
  }
  .card:active{transform:scale(0.985);}

  .ring{
    flex:0 0 auto;
    width:52px; height:52px;
    position:relative;
  }
  .ring svg{transform:rotate(-90deg); width:52px; height:52px;}
  .ring circle{fill:none; stroke-width:5;}
  .ring .bg{stroke:rgba(0,0,0,0.06);}
  .ring .fg{stroke-linecap:round; transition:stroke-dashoffset .4s ease;}
  .ring .label{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; color:var(--ink-soft); flex-direction:column; line-height:1.1;
  }
  .ring .label .num{font-size:13px; color:var(--ink);}

  .card-body{flex:1; min-width:0;}
  .card-title{
    font-size:15px; font-weight:700; margin:0 0 2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .card-meta{
    font-size:12px; color:var(--ink-soft); display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  }
  .tag{
    background:rgba(63,160,124,0.12); color:var(--teal-deep);
    padding:2px 8px; border-radius:8px; font-weight:600; font-size:11px;
  }
  .stock-num{font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink);}

  .stepper{
    flex:0 0 auto;
    display:flex; align-items:center; gap:2px;
    background:rgba(255,255,255,0.7);
    border-radius:14px;
    padding:4px;
    border:1px solid rgba(255,255,255,0.8);
  }
  .stepper button{
    width:30px; height:30px; border-radius:10px; border:none;
    background:transparent; font-size:17px; font-weight:700;
    color:var(--teal-deep); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper button:active{background:rgba(63,160,124,0.15);}
  .stepper .qty{
    width:26px; text-align:center; font-weight:700; font-size:14px;
    font-variant-numeric:tabular-nums;
  }

  .fab-row{
    position:fixed; bottom:24px; left:0; right:0;
    display:flex; justify-content:center; gap:12px;
    z-index:30; pointer-events:none;
  }
  .fab-row > *{pointer-events:auto;}
  .fab{
    display:flex; align-items:center; gap:8px;
    border:none; border-radius:999px;
    padding:14px 22px;
    font-size:14.5px; font-weight:700;
    box-shadow:0 10px 26px rgba(44,122,92,0.35);
    cursor:pointer;
  }
  .fab.primary{
    background:linear-gradient(135deg, var(--teal), var(--teal-deep));
    color:white;
  }
  .fab.secondary{
    background:var(--glass-bg);
    color:var(--ink);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    box-shadow:var(--shadow);
  }

  input[type=file]{display:none;}

  /* Modal / sheet */
  .sheet-overlay{
    position:fixed; inset:0; background:rgba(30,40,35,0.35);
    backdrop-filter:blur(2px);
    z-index:50; display:none;
    align-items:flex-end;
  }
  .sheet-overlay.show{display:flex;}
  .sheet{
    width:100%; max-height:85vh; overflow-y:auto;
    background:rgba(250,252,250,0.96);
    backdrop-filter:blur(24px);
    border-radius:24px 24px 0 0;
    padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    animation:slideUp .25s ease;
    box-shadow:0 -10px 40px rgba(0,0,0,0.15);
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet-handle{
    width:36px; height:4px; background:rgba(0,0,0,0.15); border-radius:2px;
    margin:0 auto 14px;
  }
  .sheet h3{margin:0 0 4px; font-size:17px;}
  .sheet .hint{font-size:12.5px; color:var(--ink-soft); margin:0 0 16px;}

  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:12px; font-weight:700; color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%; padding:11px 12px; border-radius:12px;
    border:1px solid rgba(0,0,0,0.08); background:white;
    font-size:15px; color:var(--ink);
  }
  .field-row{display:flex; gap:10px;}
  .field-row .field{flex:1;}

  .btn-block{
    width:100%; padding:14px; border:none; border-radius:14px;
    font-size:15px; font-weight:700; cursor:pointer; margin-top:4px;
  }
  .btn-block.primary{background:linear-gradient(135deg, var(--teal), var(--teal-deep)); color:white;}
  .btn-block.ghost{background:rgba(0,0,0,0.04); color:var(--ink-soft); margin-top:8px;}

  .ocr-item{
    background:white; border-radius:14px; padding:12px; margin-bottom:10px;
    border:1px solid rgba(0,0,0,0.06);
  }
  .ocr-item .row{display:flex; gap:8px; margin-bottom:8px;}
  .ocr-item input{
    padding:9px 10px; border-radius:10px; border:1px solid rgba(0,0,0,0.08);
    font-size:14px; width:100%;
  }
  .ocr-item .remove{
    background:none; border:none; color:var(--coral); font-size:12px; font-weight:700; cursor:pointer;
  }
  .dup-badge{
    display:inline-block; font-size:11px; font-weight:700; color:var(--amber);
    background:var(--amber-soft); padding:3px 8px; border-radius:8px; margin-bottom:8px;
  }

  .loading-state{
    display:flex; flex-direction:column; align-items:center; padding:36px 10px; gap:12px;
  }
  .spinner{
    width:34px; height:34px; border-radius:50%;
    border:3px solid rgba(63,160,124,0.15); border-top-color:var(--teal);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-state p{font-size:13px; color:var(--ink-soft); margin:0;}

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-60px);
    background:rgba(30,40,35,0.88); color:white; padding:10px 18px; border-radius:12px;
    font-size:13px; z-index:100; transition:transform .3s ease; font-weight:600;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  .swipe-delete{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    font-size:11px; color:var(--coral); background:var(--coral-soft);
    padding:4px 8px; border-radius:8px; border:none; font-weight:700;
  }
  .tab-bar{
    display:flex; gap:4px;
    background:rgba(255,255,255,0.55);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(14px);
    border-radius:14px;
    padding:4px;
    margin:14px 16px 0;
  }
  .tab-btn{
    flex:1; border:none; background:transparent; padding:9px 10px;
    border-radius:10px; font-size:13.5px; font-weight:700;
    color:var(--ink-soft); cursor:pointer;
    transition:background .2s ease, color .2s ease;
  }
  .tab-btn.active{
    background:linear-gradient(135deg, var(--teal), var(--teal-deep));
    color:white;
    box-shadow:0 4px 14px rgba(44,122,92,0.3);
  }

  .stat-card{
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(16px) saturate(160%);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
  }
  .stat-card h3{
    margin:0 0 12px; font-size:14px; font-weight:700; color:var(--ink);
    display:flex; align-items:center; gap:6px;
  }
  .big-stats{
    display:flex; gap:10px; margin-bottom:14px;
  }
  .big-stat{
    flex:1; text-align:center; padding:16px 8px;
    background:var(--glass-bg); border:1px solid var(--glass-border);
    backdrop-filter:blur(14px); border-radius:18px; box-shadow:var(--shadow);
  }
  .big-stat .num{
    font-size:26px; font-weight:800; color:var(--teal-deep);
    font-variant-numeric:tabular-nums; line-height:1.1;
  }
  .big-stat .label{font-size:11.5px; color:var(--ink-soft); margin-top:4px; font-weight:600;}

  .cat-row{margin-bottom:14px;}
  .cat-row:last-child{margin-bottom:0;}
  .cat-row .cat-top{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:13px; margin-bottom:6px;
  }
  .cat-row .cat-name{font-weight:700; color:var(--ink);}
  .cat-row .cat-count{color:var(--ink-soft); font-size:12px;}
  .cat-bar-bg{
    height:8px; border-radius:6px; background:rgba(0,0,0,0.06); overflow:hidden;
  }
  .cat-bar-fg{
    height:100%; border-radius:6px;
    background:linear-gradient(90deg, var(--teal), var(--teal-deep));
    transition:width .4s ease;
  }

  .recent-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0; border-bottom:1px solid rgba(0,0,0,0.05);
    font-size:13px;
  }
  .recent-row:last-child{border-bottom:none;}
  .recent-row .rn{font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%;}
  .recent-row .rd{color:var(--ink-soft); font-size:12px; font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<div class="topbar">
  <h1>保健存量</h1>
  <div class="sub" id="dateLabel"></div>
  <div class="summary-row" id="summaryRow"></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabList">📦 庫存清單</button>
  <button class="tab-btn" id="tabOverview">📊 總覽統計</button>
</div>

<main>
  <div id="listArea"></div>
  <div id="overviewArea" style="display:none;"></div>
</main>

<div class="fab-row">
  <button class="fab secondary" id="btnManualAdd">✏️ 手動新增</button>
  <button class="fab primary" id="btnPaste">📋 貼上訂單文字</button>
</div>

<!-- 貼上訂單文字 sheet -->
<div class="sheet-overlay" id="pasteOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>貼上訂單文字</h3>
    <p class="hint">在 iHerb 訂單詳情頁面，連同「送達日期」一起長按選取複製（iPhone 截圖也可以用「即時文字辨識」框選複製），再貼到下面，會自動抓出商品名稱、數量與購買日期。</p>
    <div class="field">
      <textarea id="pasteText" placeholder="在這裡貼上訂單文字…" style="width:100%; min-height:160px; padding:12px; border-radius:12px; border:1px solid rgba(0,0,0,0.08); font-size:14px; font-family:inherit; resize:vertical;"></textarea>
    </div>
    <button class="btn-block primary" id="parseBtn">解析文字</button>
    <button class="btn-block ghost" id="pasteCancel">取消</button>
  </div>
</div>

<!-- OCR 確認 sheet -->
<div class="sheet-overlay" id="ocrOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="ocrContent"></div>
  </div>
</div>

<!-- 手動新增 sheet -->
<div class="sheet-overlay" id="manualOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>手動新增品項</h3>
    <p class="hint">直接輸入商品資訊加入庫存</p>
    <div class="field">
      <label>商品名稱</label>
      <input type="text" id="mName" placeholder="例如：California Gold Nutrition 魚油">
    </div>
    <div class="field-row">
      <div class="field">
        <label>數量</label>
        <input type="number" id="mQty" value="1" min="1">
      </div>
      <div class="field">
        <label>分類</label>
        <select id="mCategory">
          <option value="🧬 維他命">🧬 維他命</option>
          <option value="🦠 益生菌">🦠 益生菌</option>
          <option value="🐟 魚油/Omega">🐟 魚油/Omega</option>
          <option value="⚙️ 礦物質">⚙️ 礦物質</option>
          <option value="💊 其他">💊 其他</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>每日服用量（選填，用來估算可用天數）</label>
      <input type="number" id="mDaily" placeholder="例如：2" min="0" step="0.5">
    </div>
    <div class="field">
      <label>購買日期（已送達日期，選填）</label>
      <input type="date" id="mPurchaseDate">
    </div>
    <div class="field">
      <label>購買單價（NT$，選填）</label>
      <input type="number" id="mUnitPrice" placeholder="例如：939" min="0">
    </div>
    <button class="btn-block primary" id="mSave">加入庫存</button>
    <button class="btn-block ghost" id="mCancel">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'supp_inventory_v1';
let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); render(); }

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function daysLeft(item){
  if(!item.daily || item.daily <= 0) return null;
  return Math.floor(item.qty / item.daily);
}

function ringColor(days){
  if(days === null) return '#9db3a8';
  if(days <= 7) return getComputedStyle(document.documentElement).getPropertyValue('--coral').trim();
  if(days <= 21) return getComputedStyle(document.documentElement).getPropertyValue('--amber').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--teal').trim();
}

function renderRing(item){
  const days = daysLeft(item);
  const color = ringColor(days);
  const pct = days === null ? (item.qty > 0 ? 0.6 : 0) : Math.max(0, Math.min(1, days / 30));
  const r = 21, c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  const label = days === null ? (item.qty <= 0 ? '缺貨' : item.qty) : days + '天';
  const sub = days === null ? '' : '剩';
  return `
    <div class="ring">
      <svg viewBox="0 0 52 52">
        <circle class="bg" cx="26" cy="26" r="${r}"></circle>
        <circle class="fg" cx="26" cy="26" r="${r}" stroke="${color}"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="label">
        <span class="num">${label}</span>
        ${sub ? `<span>${sub}</span>` : ''}
      </div>
    </div>`;
}

function render(){
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'short'});

  // summary chips
  const total = items.length;
  const low = items.filter(i => {
    const d = daysLeft(i);
    return (d !== null && d <= 7) || i.qty <= 1;
  }).length;
  const out = items.filter(i => i.qty <= 0).length;
  document.getElementById('summaryRow').innerHTML = `
    <div class="chip">📦 總品項 <b>${total}</b></div>
    <div class="chip ${low ? 'alert' : ''}">⚠️ 即將用完 <b>${low}</b></div>
    <div class="chip ${out ? 'alert' : ''}">🚫 已缺貨 <b>${out}</b></div>
  `;

  const listArea = document.getElementById('listArea');
  if(items.length === 0){
    listArea.innerHTML = `
      <div class="empty-state">
        <div class="icon">🧴</div>
        <h2>還沒有任何庫存</h2>
        <p>拍下你的 iHerb 訂單截圖，或手動新增第一個品項</p>
      </div>`;
    renderOverview();
    return;
  }

  // sort: out of stock/low first
  const sorted = [...items].sort((a,b)=>{
    const da = daysLeft(a), db = daysLeft(b);
    const scoreA = a.qty <= 0 ? -1 : (da !== null ? da : 99);
    const scoreB = b.qty <= 0 ? -1 : (db !== null ? db : 99);
    return scoreA - scoreB;
  });

  listArea.innerHTML = sorted.map(item => {
    const d = daysLeft(item);
    return `
    <div class="card" data-id="${item.id}">
      ${renderRing(item)}
      <div class="card-body">
        <p class="card-title">${escapeHtml(chineseName(item.name))}</p>
        <div class="card-meta">
          <span class="tag">${item.category || '💊 其他'}</span>
          <span>庫存 <span class="stock-num">${item.qty}</span></span>
          ${d !== null ? `<span>· 每日 ${item.daily}</span>` : ''}
          ${item.purchaseDate ? `<span>· 購入 ${formatDate(item.purchaseDate)}</span>` : ''}
          ${item.unitPrice != null && item.unitPrice !== '' ? `<span>· NT$${item.unitPrice}</span>` : ''}
        </div>
      </div>
      <div class="stepper">
        <button class="dec" aria-label="減少">−</button>
        <span class="qty">${item.qty}</span>
        <button class="inc" aria-label="增加">＋</button>
      </div>
    </div>`;
  }).join('');

  listArea.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    card.querySelector('.inc').addEventListener('click', () => changeQty(id, 1));
    card.querySelector('.dec').addEventListener('click', () => changeQty(id, -1));
    card.addEventListener('dblclick', () => { if(confirm('刪除此品項？')) deleteItem(id); });
  });

  renderOverview();
}

const CATEGORIES = ['🧬 維他命','🦠 益生菌','🐟 魚油/Omega','⚙️ 礦物質','💊 其他'];

function renderOverview(){
  const overviewArea = document.getElementById('overviewArea');

  if(items.length === 0){
    overviewArea.innerHTML = `
      <div class="empty-state">
        <div class="icon">📊</div>
        <h2>還沒有統計資料</h2>
        <p>加入品項後，這裡會顯示庫存總覽</p>
      </div>`;
    return;
  }

  const totalItems = items.length;
  const totalQty = items.reduce((sum, i) => sum + Number(i.qty || 0), 0);
  const totalBottles = items.reduce((sum, i) => sum + (i.qty > 0 ? 1 : 0), 0);
  const lowCount = items.filter(i => {
    const d = daysLeft(i);
    return (d !== null && d <= 7) || i.qty <= 1;
  }).length;

  // 依分類統計
  const catStats = CATEGORIES.map(cat => {
    const catItems = items.filter(i => (i.category || '💊 其他') === cat);
    return {
      cat,
      count: catItems.length,
      qty: catItems.reduce((sum, i) => sum + Number(i.qty || 0), 0)
    };
  }).filter(c => c.count > 0);
  const maxQty = Math.max(1, ...catStats.map(c => c.qty));

  // 最近購買
  const recent = [...items]
    .filter(i => i.purchaseDate)
    .sort((a,b) => b.purchaseDate.localeCompare(a.purchaseDate))
    .slice(0, 5);

  // 依單價估算目前庫存價值（僅計入有填單價的品項，數量以目前剩餘庫存計算）
  const pricedItems = items.filter(i => i.unitPrice != null && i.unitPrice !== '');
  const stockValue = pricedItems.reduce((sum, i) => sum + Number(i.unitPrice) * Number(i.qty || 0), 0);

  overviewArea.innerHTML = `
    <div class="big-stats">
      <div class="big-stat">
        <div class="num">${totalItems}</div>
        <div class="label">品項種類</div>
      </div>
      <div class="big-stat">
        <div class="num">${totalQty}</div>
        <div class="label">總庫存數量</div>
      </div>
      <div class="big-stat">
        <div class="num">${lowCount}</div>
        <div class="label">即將用完</div>
      </div>
    </div>

    ${pricedItems.length > 0 ? `
    <div class="stat-card">
      <h3>💰 目前庫存估值</h3>
      <div class="big-stats" style="margin-bottom:0;">
        <div class="big-stat" style="flex:1;">
          <div class="num">NT$${stockValue.toLocaleString()}</div>
          <div class="label">依單價 × 剩餘數量估算</div>
        </div>
      </div>
    </div>` : ''}

    <div class="stat-card">
      <h3>📂 分類統計</h3>
      ${catStats.map(c => `
        <div class="cat-row">
          <div class="cat-top">
            <span class="cat-name">${c.cat}</span>
            <span class="cat-count">${c.count} 項品項 · 共 ${c.qty} 份</span>
          </div>
          <div class="cat-bar-bg">
            <div class="cat-bar-fg" style="width:${Math.round(c.qty / maxQty * 100)}%"></div>
          </div>
        </div>
      `).join('')}
    </div>

    ${recent.length > 0 ? `
    <div class="stat-card">
      <h3>🕒 最近購買</h3>
      ${recent.map(i => `
        <div class="recent-row">
          <span class="rn">${escapeHtml(chineseName(i.name))}</span>
          <span class="rd">${formatDate(i.purchaseDate)}${i.unitPrice != null && i.unitPrice !== '' ? ' · NT$' + i.unitPrice : ''}</span>
        </div>
      `).join('')}
    </div>` : ''}
  `;
}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// 只取商品名稱中的中文部分顯示（英文品牌/型號名保留在資料裡，僅顯示時過濾）
function chineseName(name){
  if(!name) return name;
  const matches = name.match(/[\u3400-\u9FFF]+/g);
  if(!matches || matches.length === 0) return name; // 沒有中文就顯示原名，避免空白
  return matches.join(' ');
}

function formatDate(iso){
  if(!iso) return '';
  const [y, m, d] = iso.split('-');
  if(!y) return iso;
  return `${y}/${m}/${d}`;
}

function changeQty(id, delta){
  const item = items.find(i => i.id === id);
  if(!item) return;
  item.qty = Math.max(0, item.qty + delta);
  save();
  if(delta < 0) showToast(`已扣除 1 份 · ${item.name}`);
}

function deleteItem(id){
  items = items.filter(i => i.id !== id);
  save();
  showToast('已刪除品項');
}

// ---------- 貼上訂單文字解析 ----------
const pasteOverlay = document.getElementById('pasteOverlay');
const ocrOverlay = document.getElementById('ocrOverlay');
const ocrContent = document.getElementById('ocrContent');

document.getElementById('btnPaste').addEventListener('click', () => {
  document.getElementById('pasteText').value = '';
  pasteOverlay.classList.add('show');
});
document.getElementById('pasteCancel').addEventListener('click', () => pasteOverlay.classList.remove('show'));
pasteOverlay.addEventListener('click', (e) => { if(e.target === pasteOverlay) pasteOverlay.classList.remove('show'); });

document.getElementById('parseBtn').addEventListener('click', () => {
  const text = document.getElementById('pasteText').value;
  if(!text.trim()){ showToast('請先貼上訂單文字'); return; }
  const parsed = parseOrderText(text);
  pasteOverlay.classList.remove('show');
  ocrOverlay.classList.add('show');
  renderOcrPreview(parsed);

// 依商品名稱猜測分類
function guessCategory(name){
  const n = name.toLowerCase();
  if(/omega|魚油|dha|epa|fish oil/.test(n)) return '🐟 魚油/Omega';
  if(/probiotic|益生菌|acidophilus|lactobacillus/.test(n)) return '🦠 益生菌';
  if(/vitamin|維他命|維生素|d3|b12|b群|multivitamin/.test(n)) return '🧬 維他命';
  if(/mineral|礦物質|鈣|鎂|鋅|zinc|magnesium|calcium|iron|鐵/.test(n)) return '⚙️ 礦物質';
  return '💊 其他';
}

// 解析從 iHerb 訂單詳情複製出來的文字
// 期望格式（每行）：送達日期 → 2026年6月18日 → 商品名稱（可能多行）→ 單價：NT$xxx → 數量: N → 總價格：NT$xxx
function parseOrderText(raw){
  const noiseLines = [
    '退款/退貨','退款／退貨','訂單詳情','已送達','撰寫評論','再次購買',
    '首頁','探索','類別','購物車','我的帳戶','訂單摘要','訂單總計'
  ];
  const lines = raw.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0)
    .filter(l => !noiseLines.includes(l));

  const results = [];
  let nameBuffer = [];
  let currentDate = '';
  let expectDateNext = false;
  let currentPrice = null;

  const dateLineRegex = /^(\d{4})年(\d{1,2})月(\d{1,2})日$/;

  for(let i = 0; i < lines.length; i++){
    const line = lines[i];

    if(line === '送達日期'){
      expectDateNext = true;
      continue;
    }
    if(expectDateNext){
      expectDateNext = false;
      const m = line.match(dateLineRegex);
      if(m){
        const [, y, mo, d] = m;
        currentDate = `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
        continue;
      }
      // 不是預期的日期格式，當一般行繼續往下處理
    }
    // 沒有透過「送達日期」標題出現的獨立日期行，也順手抓一下
    const looseDate = line.match(dateLineRegex);
    if(looseDate){
      const [, y, mo, d] = looseDate;
      currentDate = `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
      continue;
    }

    const qtyMatch = line.match(/數量[:：]\s*(\d+)/);
    const priceMatch = line.match(/^單價[:：]?\s*NT?\$?\s*([\d,]+)/);
    const totalLine = /^總價格/.test(line);

    if(priceMatch){
      currentPrice = parseInt(priceMatch[1].replace(/,/g,'')) || null;
      continue; // 單價行不併入名稱
    }
    if(qtyMatch){
      const name = nameBuffer.join(' ').replace(/\s+/g,' ').trim();
      if(name){
        results.push({
          name,
          quantity: parseInt(qtyMatch[1]) || 1,
          category: guessCategory(name),
          purchaseDate: currentDate,
          unitPrice: currentPrice
        });
      }
      nameBuffer = [];
      currentPrice = null;
      continue;
    }
    if(totalLine){
      continue; // 總價格不需要，略過
    }
    // 純數字/價格行，略過（避免混入名稱）
    if(/^NT\$?[\d,]+$/.test(line)) continue;

    nameBuffer.push(line);
  }

  return results;
}

let ocrDraft = [];

function renderOcrPreview(parsedItems){
  if(!parsedItems || parsedItems.length === 0){
    ocrContent.innerHTML = `
      <h3>沒有解析到商品</h3>
      <p class="hint">請確認貼上的文字包含「數量:」這類欄位，或改用手動新增。</p>
      <button class="btn-block ghost" onclick="document.getElementById('ocrOverlay').classList.remove('show')">關閉</button>`;
    return;
  }
  ocrDraft = parsedItems.map(it => ({
    id: uid(), name: it.name || '未命名商品', qty: it.quantity || 1,
    category: it.category || '💊 其他', purchaseDate: it.purchaseDate || '',
    unitPrice: it.unitPrice != null ? it.unitPrice : ''
  }));
  renderOcrList();
}

// 檢查是否與現有庫存中的品項重複（名稱、數量、購買日期皆相同）
function isDuplicate(candidate){
  const name = (candidate.name || '').trim();
  return items.some(existing =>
    existing.name.trim() === name &&
    Number(existing.qty) === Number(candidate.qty) &&
    (existing.purchaseDate || '') === (candidate.purchaseDate || '')
  );
}

function renderOcrList(){
  ocrContent.innerHTML = `
    <h3>解析到 ${ocrDraft.length} 項商品</h3>
    <p class="hint">確認或修改後加入庫存</p>
    <div id="ocrItemsList"></div>
    <button class="btn-block primary" id="ocrConfirm">全部加入庫存</button>
    <button class="btn-block ghost" id="ocrCancel">取消</button>
  `;
  const listEl = document.getElementById('ocrItemsList');
  listEl.innerHTML = ocrDraft.map(it => `
    <div class="ocr-item" data-id="${it.id}">
      ${isDuplicate(it) ? `<span class="dup-badge">⚠️ 可能與現有庫存重複</span>` : ''}
      <div class="row">
        <input type="text" class="ocr-name" value="${escapeHtml(it.name)}" placeholder="商品名稱">
      </div>
      <div class="row">
        <input type="number" class="ocr-qty" value="${it.qty}" min="1" style="max-width:80px;">
        <select class="ocr-cat" style="flex:1; padding:9px 10px; border-radius:10px; border:1px solid rgba(0,0,0,0.08); font-size:13px;">
          ${['🧬 維他命','🦠 益生菌','🐟 魚油/Omega','⚙️ 礦物質','💊 其他'].map(c =>
            `<option value="${c}" ${c===it.category?'selected':''}>${c}</option>`).join('')}
        </select>
        <button class="remove">刪除</button>
      </div>
      <div class="row">
        <label style="font-size:11px; color:var(--ink-soft); display:flex; align-items:center; gap:6px; width:100%;">
          購買日期
          <input type="date" class="ocr-date" value="${it.purchaseDate}" style="flex:1; padding:8px 10px; border-radius:10px; border:1px solid rgba(0,0,0,0.08); font-size:13px;">
        </label>
      </div>
      <div class="row">
        <label style="font-size:11px; color:var(--ink-soft); display:flex; align-items:center; gap:6px; width:100%;">
          單價 (NT$)
          <input type="number" class="ocr-price" value="${it.unitPrice}" min="0" placeholder="選填" style="flex:1; padding:8px 10px; border-radius:10px; border:1px solid rgba(0,0,0,0.08); font-size:13px;">
        </label>
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('.ocr-item').forEach(row => {
    const id = row.dataset.id;
    row.querySelector('.ocr-name').addEventListener('input', e => {
      ocrDraft.find(x=>x.id===id).name = e.target.value;
    });
    row.querySelector('.ocr-qty').addEventListener('input', e => {
      ocrDraft.find(x=>x.id===id).qty = parseInt(e.target.value) || 1;
    });
    row.querySelector('.ocr-cat').addEventListener('change', e => {
      ocrDraft.find(x=>x.id===id).category = e.target.value;
    });
    row.querySelector('.ocr-date').addEventListener('input', e => {
      ocrDraft.find(x=>x.id===id).purchaseDate = e.target.value;
    });
    row.querySelector('.ocr-price').addEventListener('input', e => {
      ocrDraft.find(x=>x.id===id).unitPrice = e.target.value === '' ? '' : parseInt(e.target.value) || 0;
    });
    row.querySelector('.remove').addEventListener('click', () => {
      ocrDraft = ocrDraft.filter(x => x.id !== id);
      renderOcrList();
    });
  });

  document.getElementById('ocrConfirm').addEventListener('click', () => {
    const dupItems = ocrDraft.filter(isDuplicate);

    if(dupItems.length > 0){
      const dupNames = dupItems.map(it => `・${it.name}（數量 ${it.qty}${it.purchaseDate ? '，' + formatDate(it.purchaseDate) : ''}）`).join('\n');
      const confirmAll = confirm(
        `有 ${dupItems.length} 項商品的名稱、數量、購買日期都與現有庫存相同，可能是重複訂單：\n\n${dupNames}\n\n按「確定」仍新增全部品項，按「取消」則只新增其餘不重複的品項。`
      );
      const toAdd = confirmAll ? ocrDraft : ocrDraft.filter(it => !isDuplicate(it));
      toAdd.forEach(it => {
        items.push({ id: uid(), name: it.name, qty: it.qty, category: it.category, daily: 0, purchaseDate: it.purchaseDate || '', unitPrice: it.unitPrice === '' ? null : it.unitPrice });
      });
      save();
      ocrOverlay.classList.remove('show');
      if(toAdd.length === 0){
        showToast('已略過所有重複品項');
      }else{
        showToast(confirmAll ? `已加入 ${toAdd.length} 項商品` : `已加入 ${toAdd.length} 項（略過 ${dupItems.length} 項重複）`);
      }
      ocrDraft = [];
      return;
    }

    ocrDraft.forEach(it => {
      items.push({ id: uid(), name: it.name, qty: it.qty, category: it.category, daily: 0, purchaseDate: it.purchaseDate || '', unitPrice: it.unitPrice === '' ? null : it.unitPrice });
    });
    save();
    ocrOverlay.classList.remove('show');
    showToast(`已加入 ${ocrDraft.length} 項商品`);
    ocrDraft = [];
  });
  document.getElementById('ocrCancel').addEventListener('click', () => {
    ocrOverlay.classList.remove('show');
    ocrDraft = [];
  });
}

ocrOverlay.addEventListener('click', (e) => {
  if(e.target === ocrOverlay){ ocrOverlay.classList.remove('show'); ocrDraft = []; }
});

render();
</script>
