<style>
  :root{
    --paper:#F3EFE4;
    --paper-deep:#EAE3D2;
    --ink:#2B2A28;
    --ink-soft:#6B6459;
    --jade:#2F5D50; --jade-soft:#DDE8E2;
    --brick:#A03B3B; --brick-soft:#F1DFDA;
    --blue:#355E7A; --blue-soft:#DCE6EC;
    --olive:#7C7530; --olive-soft:#EAE7D3;
    --plum:#7A4B6B; --plum-soft:#EDDEE7;

  body{

  }
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin-bottom:24px;}
  header .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--ink-soft);text-transform:uppercase;}
  header h1{font-family:'Noto Serif TC',serif;font-weight:900;font-size:30px;margin:6px 0 2px;letter-spacing:.06em;}
  header p.sub{font-size:13px;color:var(--ink-soft);margin:0;}

  .undo-bar{background:#3A2F22;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .undo-bar button{background:var(--amber);padding:5px 10px;font-size:12px;}

  .reminder-bar{background:#FDF1DC;border:1px solid var(--amber);color:#6b4a12;padding:10px 14px;border-radius:6px;font-size:12.5px;margin-bottom:16px;line-height:1.7;}
  .reminder-bar strong{display:block;margin-bottom:4px;font-size:13px;}

  .stamps{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
  .stamp-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:4px;padding:16px 14px 14px;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.04);}
  .stamp-card .label{font-size:11px;color:var(--ink-soft);letter-spacing:.03em;}
  .stamp-card .num{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;line-height:1.15;margin-top:4px;}
  .stamp-card .num small{font-size:11px;font-weight:500;margin-left:3px;color:var(--ink-soft);display:block;margin-top:2px;}

  .seal{position:absolute;right:-8px;top:-8px;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-weight:900;font-size:18px;transform:rotate(-12deg);opacity:.8;border:2px solid currentColor;}

  .c-jade{color:var(--jade);} .c-brick{color:var(--brick);} .c-blue{color:var(--blue);} .c-olive{color:var(--olive);} .c-plum{color:var(--plum);} .c-rust{color:var(--rust);}
  .c-jade-bg{background:var(--jade);} .c-brick-bg{background:var(--brick);} .c-blue-bg{background:var(--blue);} .c-olive-bg{background:var(--olive);} .c-plum-bg{background:var(--plum);} .c-rust-bg{background:var(--rust);}

  .dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
  .dash-card{background:#fff;border:1px solid var(--line);border-radius:4px;padding:12px 14px;text-align:center;}
  .dash-card .label{font-size:11px;color:var(--ink-soft);}

  .toolbar{background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:18px;}
  .toolbar-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .toolbar-row + .toolbar-row{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
  .toolbar-row input[type=text]{flex:1;min-width:160px;font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);}
  .year-switch{display:flex;align-items:center;gap:6px;}
  .view-toggles{display:flex;gap:8px;}
  .view-toggles button{flex:1;}
  button.sortbtn{background:#fff;color:var(--ink-soft);border:1px solid var(--line);font-weight:500;padding:8px 12px;}
  .year-label{font-family:'IBM Plex Mono',monospace;font-weight:700;min-width:64px;text-align:center;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase;margin:6px 2px 10px;}
  .manage-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

  section.block h2 .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot-jade{background:var(--jade);} .dot-brick{background:var(--brick);} .dot-blue{background:var(--blue);} .dot-olive{background:var(--olive);} .dot-plum{background:var(--plum);} .dot-rust{background:var(--rust);}

  form.entry{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px;}

  .date-toggle{padding:7px 8px;font-size:11px;background:#fff;color:var(--ink-soft);border:1px solid var(--line);font-weight:500;flex:none;}
  .days-row input[type=number]{width:64px;flex:none;}
  .field-days{flex:1 1 220px;min-width:220px;}

  .btn-jade{background:var(--jade);} .btn-brick{background:var(--brick);} .btn-blue{background:var(--blue);} .btn-olive{background:var(--olive);} .btn-plum{background:var(--plum);} .btn-rust{background:var(--rust);}
  button.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);font-weight:500;}

  .total-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:16px;padding-bottom:14px;border-bottom:1px dashed var(--line);flex-wrap:wrap;}

  ul.ledger li:last-child{margin-bottom:0;}
  ul.ledger .ledger-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  ul.ledger .ledger-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;}
  ul.ledger .d{font-family:'IBM Plex Mono',monospace;color:var(--ink-soft);font-size:12px;}
  ul.ledger .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;text-align:center;}
  ul.ledger .days{font-family:'IBM Plex Mono',monospace;font-weight:700;}
  ul.ledger .note{color:var(--ink);font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
  ul.ledger .expiry{font-size:10.5px;color:var(--amber);font-family:'IBM Plex Mono',monospace;flex:1;}
  ul.ledger .ledger-actions{display:flex;gap:6px;margin-left:auto;flex:none;}
  ul.ledger .del{background:#fff;border:1px solid var(--line);border-radius:4px;color:var(--ink-soft);font-size:12px;font-weight:500;cursor:pointer;padding:5px 9px;line-height:1;display:inline-flex;align-items:center;gap:3px;}
  ul.ledger li.editrow{display:flex;flex-wrap:wrap;align-items:center;background:#fffaf0;border-radius:4px;padding:8px;gap:6px;}

  .empty{font-size:13px;color:var(--ink-soft);padding:8px 2px;}

  @keyframes stampIn{0%{transform:scale(1.5) rotate(-6deg);opacity:0;}60%{transform:scale(.96) rotate(1deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  li.stamp-in{animation:stampIn .32s ease-out;}

  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:15px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-weekdays{margin-bottom:4px;font-size:11px;color:var(--ink-soft);text-align:center;}
  .cal-cell{min-height:52px;border:1px solid var(--line);border-radius:4px;padding:3px;background:#fff;}
  .cal-cell.empty{border:none;background:transparent;}
  .cal-cell.today{border-color:var(--jade);box-shadow:0 0 0 1px var(--jade) inset;}
  .cal-daynum{font-size:10px;color:var(--ink-soft);}
  .cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
  .cal-dot{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:8px;font-weight:700;color:#fff;}

  .chart-wrap{display:flex;gap:5px;align-items:flex-end;height:150px;padding:8px 2px 0;overflow-x:auto;}
  .chart-col{flex:1;min-width:20px;display:flex;flex-direction:column;align-items:center;}
  .chart-bar-track{width:100%;max-width:24px;height:130px;display:flex;flex-direction:column-reverse;background:var(--paper-deep);border-radius:2px 2px 0 0;overflow:hidden;}
  .chart-seg{width:100%;}
  .chart-label{font-size:9.5px;color:var(--ink-soft);margin-top:4px;}
  .chart-total{font-size:9px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .chart-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:11px;color:var(--ink-soft);}
  .legend-item{display:flex;align-items:center;gap:4px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .backup{background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:6px;padding:18px 16px 20px;}
  .backup.danger-zone{border-color:var(--brick);background:rgba(241,223,218,.5);margin-bottom:20px;}
  .backup.danger-zone h2{color:var(--brick);}
  .month-group{margin-bottom:10px;}
  .month-group:last-child{margin-bottom:0;}
  .month-header{width:100%;display:flex;align-items:center;gap:8px;background:var(--paper-deep);border:1px solid var(--line);border-radius:6px;padding:9px 12px;color:var(--ink);text-align:left;}
  .month-header .month-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:13.5px;}
  .month-header .month-meta{font-size:11.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;margin-left:auto;}
  .month-header .chevron{color:var(--ink-soft);font-size:11px;}
  .month-group .ledger{margin-top:8px;}
  .reset-row{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);flex-wrap:wrap;}
  .reset-label{font-size:12px;color:var(--ink-soft);}
  .reset-row select{font-family:'Noto Sans TC',sans-serif;font-size:12.5px;padding:6px 7px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);}
  .danger-btn{background:#fff;color:var(--brick);border:1px solid var(--brick);font-weight:700;padding:6px 12px;font-size:12.5px;}
  .backup h2{font-family:'Noto Serif TC',serif;font-size:16px;margin:0 0 6px;}
  .backup p{font-size:12.5px;color:var(--ink-soft);margin:0 0 12px;line-height:1.6;}
  .backup .row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  textarea{width:100%;font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--line);border-radius:4px;padding:8px;background:#fdfcf9;color:var(--ink-soft);resize:vertical;}
  .status{font-size:12px;margin-top:8px;min-height:16px;}
  .status.ok{color:var(--jade);}
  .status.err{color:var(--brick);}
  .loading{text-align:center;padding:60px 0;color:var(--ink-soft);font-size:13px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<body>
<div class="wrap" id="app">
  <div class="loading" id="loading">載入存摺資料中…</div>
</div>

<script>
const STORAGE_KEY = 'leave-passbook-data';

const firebaseConfig = {
  apiKey: "AIzaSyC5YIH145QTtNlSy8JyRsXsJjerS98eufE",
  authDomain: "leave-passbook-b3bc0.firebaseapp.com",
  projectId: "leave-passbook-b3bc0",
  storageBucket: "leave-passbook-b3bc0.firebasestorage.app",
  messagingSenderId: "391707124875",
  appId: "1:391707124875:web:adc76c284479df83e8a08e"
};

let currentUser = null;
let fbAuth = null;
let fbDb = null;
let cloudSyncing = false;

function initFirebase(){
  try{
    if(typeof firebase === 'undefined') return;
    firebase.initializeApp(firebaseConfig);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbAuth.onAuthStateChanged(async (user)=>{
      currentUser = user;
      if(user){ await pullOrPushOnSignIn(); }
      render();
    });
    fbAuth.getRedirectResult().catch(e=>{
      setStatus('登入失敗：' + (e && e.message ? e.message : String(e)), false);
    });
  }catch(e){ console.error('Firebase 初始化失敗', e); }
}

async function signInWithGoogle(){
  if(!fbAuth){ setStatus('雲端同步尚未就緒，請稍後再試', false); return; }
  try{
    const provider = new firebase.auth.GoogleAuthProvider();
    await fbAuth.signInWithRedirect(provider);
  }catch(e){
    setStatus('登入失敗：' + (e && e.message ? e.message : String(e)), false);
  }
}

async function signOutUser(){
  if(!fbAuth) return;
  try{
    await fbAuth.signOut();
    currentUser = null;
    render();
    setStatus('已登出，之後資料只會存在本機', true);
  }catch(e){
    setStatus('登出失敗：' + (e && e.message ? e.message : String(e)), false);
  }
}

function applyCloudData(jsonStr){
  try{
    const parsed = JSON.parse(jsonStr);
    state = Object.assign(defaultState(), parsed);
  }catch(e){ console.error('雲端資料格式錯誤', e); }
}

async function pullOrPushOnSignIn(){
  if(!fbDb || !currentUser) return;
  try{
    const docRef = fbDb.collection('leavePassbook').doc(currentUser.uid);
    const snap = await docRef.get();
    if(!snap.exists){
      await docRef.set({ data: JSON.stringify(state), updatedAt: Date.now() });
      setStatus('已將目前資料上傳到雲端', true);
    } else {
      const cloudData = snap.data();
      const localHasData = Object.values(state.records).some(arr=>arr.length>0) || state.compRecords.length>0;
      if(localHasData){
        const useCloud = window.confirm('雲端已經有備份資料。\n按「確定」會用雲端資料覆蓋目前畫面（適合換裝置登入時使用）。\n按「取消」會用目前畫面的資料覆蓋雲端。');
        if(useCloud){ applyCloudData(cloudData.data); }
        else { await docRef.set({ data: JSON.stringify(state), updatedAt: Date.now() }); }
      } else {
        applyCloudData(cloudData.data);
      }
    }
    await saveState();
  }catch(e){
    setStatus('雲端同步失敗：' + (e && e.message ? e.message : String(e)), false);
  }
}

async function syncToCloud(){
  if(!fbDb || !currentUser || cloudSyncing) return;
  cloudSyncing = true;
  try{
    await fbDb.collection('leavePassbook').doc(currentUser.uid).set({ data: JSON.stringify(state), updatedAt: Date.now() });
  }catch(e){
    console.error('雲端同步失敗', e);
  }finally{
    cloudSyncing = false;
  }
}


const LEAVE_TYPES = [
  {key:'annual', label:'特休', seal:'休', c:'jade', defaultQuota:0, hint:'依到職年資自行填入'},
  {key:'sick', label:'病假', seal:'病', c:'blue', defaultQuota:30, hint:'常見上限 30 天／年（半薪），實際依公司規定'},
  {key:'personal', label:'事假', seal:'事', c:'olive', defaultQuota:14, hint:'常見上限 14 天／年（不給薪），實際依公司規定'},
  {key:'familyCare', label:'家庭照顧假', seal:'家', c:'plum', defaultQuota:7, hint:'併入事假總天數計算，常見上限 7 天／年'},
  {key:'mentalCare', label:'身心照顧假', seal:'心', c:'rust', defaultQuota:3, hint:'依公司規定，預設 3 天，可自行調整'}
];

const NOW = new Date();
const TODAY = NOW.getFullYear()+'-'+String(NOW.getMonth()+1).padStart(2,'0')+'-'+String(NOW.getDate()).padStart(2,'0');
const CUR_YEAR = NOW.getFullYear();
const HOURS_PER_DAY = 8;

let state = { quotaByYear:{}, records:{}, compRecords:[] };
let lastAddedId = null;
let lastDeleted = null;
let editing = null;
let searchQuery = '';
let sortAsc = false;
let selectedYear = CUR_YEAR;
let calendarMode = false;
let calYear = CUR_YEAR;
let calMonth = NOW.getMonth()+1;
let chartMode = false;
let expiryTouched = false;
let kwPendingItems = [];
let kwUnmatchedLines = [];
let expandedMonths = {};

function monthLabel(ym){
  const y = parseInt(ym.slice(0,4),10) - 1911;
  const m = parseInt(ym.slice(5,7),10);
  return `${y}年${m}月`;
}

function toggleMonthExpand(stateKey, current){ expandedMonths[stateKey] = !current; render(); }

function renderMonthGroups(listKey, rows, emptyMsg, liBuilder, totalFn, forceExpand){
  if(rows.length===0) return `<div class="empty">${emptyMsg}</div>`;
  const groups = {};
  const order = [];
  rows.forEach(r=>{
    const ym = r.date.slice(0,7);
    if(!groups[ym]){ groups[ym]=[]; order.push(ym); }
    groups[ym].push(r);
  });
  return order.map((ym, idx)=>{
    const groupRows = groups[ym];
    const stateKey = `${listKey}-${ym}`;
    const isFirst = idx===0;
    const forced = forceExpand ? forceExpand(groupRows) : false;
    const expanded = forced ? true : (searchQuery ? true : (expandedMonths[stateKey] !== undefined ? expandedMonths[stateKey] : isFirst));
    const metaText = totalFn ? totalFn(groupRows) : `${groupRows.length} 筆`;
    return `
      <div class="month-group">
        <button type="button" class="month-header" onclick="toggleMonthExpand('${stateKey}', ${expanded})">
          <span class="month-title">${monthLabel(ym)}</span>
          <span class="month-meta">${metaText}</span>
          <span class="chevron">${expanded?'▾':'▸'}</span>
        </button>
        ${expanded? `<ul class="ledger">${groupRows.map(liBuilder).join('')}</ul>` : ''}
      </div>`;
  }).join('');
}

function onCompDateChange(){
  if(expiryTouched) return;
  const dateVal = parseFlexibleDate(document.getElementById('compDate').value);
  const expiryEl = document.getElementById('compExpiry');
  if(dateVal && expiryEl) expiryEl.value = addYears(dateVal, 2);
}

function yearMin(y){ return y+'-01-01'; }
function yearMax(y){ return y+'-12-31'; }
function defaultDateFor(y){ return y===CUR_YEAR ? TODAY : y+'-01-01'; }
function addYears(dateStr, n){
  try{
    const d = new Date(dateStr+'T00:00:00');
    d.setFullYear(d.getFullYear()+n);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }catch(e){ return ''; }
}

function defaultState(){
  const records={};
  LEAVE_TYPES.forEach(t=>{ records[t.key]=[]; });
  return { quotaByYear:{}, records, compRecords:[] };
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n){ return (Math.round(n*10)/10).toString(); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function matchesSearch(...parts){
  if(!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return parts.some(p => (p||'').toString().toLowerCase().includes(q));
}

async function loadState(){
  state = defaultState();
  try{
    let raw = null;
    if(window.storage && typeof window.storage.get === 'function'){
      const res = await window.storage.get(STORAGE_KEY, false);
      raw = res && res.value;
    } else {
      raw = localStorage.getItem(STORAGE_KEY);
    }
    if(raw){
      const parsed = JSON.parse(raw);
      state.records = Object.assign(state.records, parsed.records||{});
      state.compRecords = parsed.compRecords || [];
      if(parsed.quotaByYear){
        state.quotaByYear = parsed.quotaByYear;
      } else {
        let flatQuotas = null;
        if(parsed.quotas){ flatQuotas = parsed.quotas; }
        else if(parsed.annualTotal !== undefined){
          flatQuotas = { annual: parsed.annualTotal || 0 };
          state.records.annual = parsed.annualRecords || state.records.annual;
        }
        if(flatQuotas){ state.quotaByYear[CUR_YEAR] = Object.assign({}, flatQuotas); }
      }
    }
  }catch(e){ /* 無資料，使用預設值 */ }
}

async function saveState(){
  try{
    const json = JSON.stringify(state);
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set(STORAGE_KEY, json, false);
    } else {
      localStorage.setItem(STORAGE_KEY, json);
    }
  }catch(e){ console.error('儲存失敗', e); }
  syncToCloud();
}

function getQuota(key, year){
  year = year || selectedYear;
  const y = state.quotaByYear[year];
  if(y && y[key] !== undefined) return y[key];
  const t = LEAVE_TYPES.find(t=>t.key===key);
  return t ? t.defaultQuota : 0;
}
function setQuota(key, year, val){
  if(!state.quotaByYear[year]) state.quotaByYear[year] = {};
  state.quotaByYear[year][key] = val;
}
function usedOf(key, year){
  year = year || selectedYear;
  return (state.records[key]||[]).filter(r=>r.date.startsWith(String(year))).reduce((s,r)=>s+toDays(r),0);
}
function remainOf(key, year){
  year = year || selectedYear;
  return getQuota(key,year) - usedOf(key,year);
}
function isoDate(y,m,d){
  if(!y||!m||!d) return '';
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function parseFlexibleDate(raw){
  if(!raw) return '';
  raw = String(raw).trim();
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(raw)){
    const [y,m,d] = raw.split('-').map(Number);
    return isoDate(y,m,d);
  }
  if(raw.includes('/')){
    const parts = raw.split('/').map(s=>s.trim());
    if(parts.length===3){
      let y = parseInt(parts[0],10);
      const m = parseInt(parts[1],10);
      const d = parseInt(parts[2],10);
      if(!isNaN(y) && y < 200) y += 1911; // 兩三位數視為民國年
      return isoDate(y,m,d);
    }
    if(parts.length===2){
      const m = parseInt(parts[0],10);
      const d = parseInt(parts[1],10);
      return isoDate(CUR_YEAR, m, d); // 沒填年份，預設今年
    }
  }
  return raw;
}

function toROC(dateStr){
  if(!dateStr) return '';
  const parts = String(dateStr).split('-');
  if(parts.length!==3) return dateStr;
  const y = parseInt(parts[0],10) - 1911;
  const m = parseInt(parts[1],10);
  const d = parseInt(parts[2],10);
  if(isNaN(y) || isNaN(m) || isNaN(d)) return dateStr;
  return `${y}/${m}/${d}`;
}
function toDays(r){
  if(r.unit==='hour') return Number(r.amount)/HOURS_PER_DAY;
  if(r.unit==='day') return Number(r.amount);
  return Number(r.days)||0;
}
function displayAmount(r){
  if(r.unit==='hour') return `${fmt(r.amount)} 小時`;
  const amt = r.unit==='day' ? r.amount : r.days;
  return `${fmt(amt)} 天`;
}
function compBalanceUpTo(year){
  return state.compRecords.filter(r=> parseInt(r.date.slice(0,4),10) <= year).reduce((s,r)=> s + (r.type==='earn'? toDays(r): -toDays(r)),0);
}

const KEYWORD_LEAVE_MAP = [
  {re:'特休|年假', key:'annual', label:'特休'},
  {re:'病假|病', key:'sick', label:'病假'},
  {re:'事假|事', key:'personal', label:'事假'},
  {re:'家庭照顧假|家照', key:'familyCare', label:'家庭照顧假'},
  {re:'身心照顧假|身照|身心|不爽假', key:'mentalCare', label:'身心照顧假'}
];
const KW_AMOUNT_TOKEN = '(半天|全天|整天|[\\d.]+)';
const KW_UNIT_TOKEN = '(H|h|小時|天)?';
const KW_NOTE_TOKEN = '[\\(（]?([^\\)）]*)[\\)）]?';

function shiftDate(dateStr, deltaDays){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+deltaDays);
  return isoDate(d.getFullYear(), d.getMonth()+1, d.getDate());
}

function parseDateToken(tok, contextYear){
  if(!tok) return null;
  tok = tok.trim();
  if(tok==='今天'||tok==='今日') return TODAY;
  if(tok==='明天'||tok==='明日') return shiftDate(TODAY,1);
  if(tok==='昨天'||tok==='昨日') return shiftDate(TODAY,-1);
  let m = tok.match(/^(\d{1,4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(m){
    let y = parseInt(m[1],10);
    if(y<200) y += 1911; // 民國年自動換算
    return isoDate(y, parseInt(m[2],10), parseInt(m[3],10));
  }
  m = tok.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if(m){ return isoDate(contextYear, parseInt(m[1],10), parseInt(m[2],10)); }
  m = tok.match(/^(\d{1,2})月(\d{1,2})日?$/);
  if(m){ return isoDate(contextYear, parseInt(m[1],10), parseInt(m[2],10)); }
  return null;
}

function parseAmountToken(numTok, unitTok){
  if(numTok==='半天') return {amount:0.5, unit:'day'};
  if(numTok==='全天' || numTok==='整天') return {amount:1, unit:'day'};
  const amount = parseFloat(numTok);
  if(isNaN(amount)) return null;
  const unit = (unitTok==='H'||unitTok==='h'||unitTok==='小時') ? 'hour' : 'day';
  return {amount, unit};
}

function kwBuildFromRest(rest, defaultCompType, leaveKeywordPattern){
  let mm;
  // 加X補Y (備註) -> 補休獲得
  mm = rest.match(new RegExp(`^加\\s*[\\d.]+\\s*補\\s*([\\d.]+)\\s*${KW_NOTE_TOKEN}$`));
  if(mm){
    return { kind:'comp', compType:'earn', unit:'day', amount: parseFloat(mm[1]), note:(mm[2]||'').trim() };
  }
  // (使用|用|獲得|得)? 補休/補 X(H/天/半天/全天) (備註)
  mm = rest.match(new RegExp(`^(使用|用|獲得|得)?\\s*(?:補休|補)\\s*${KW_AMOUNT_TOKEN}\\s*${KW_UNIT_TOKEN}\\s*${KW_NOTE_TOKEN}$`));
  if(mm){
    const parsed = parseAmountToken(mm[2], mm[3]);
    if(!parsed) return null;
    let compType = defaultCompType;
    if(mm[1]==='使用' || mm[1]==='用') compType='use';
    else if(mm[1]==='獲得' || mm[1]==='得') compType='earn';
    return { kind:'comp', compType, unit:parsed.unit, amount:parsed.amount, note:(mm[4]||'').trim() };
  }
  // (請|使用|用)? <假別關鍵字> X(H/天/半天/全天) (備註)
  mm = rest.match(new RegExp(`^(請|使用|用)?\\s*(${leaveKeywordPattern})\\s*${KW_AMOUNT_TOKEN}\\s*${KW_UNIT_TOKEN}\\s*${KW_NOTE_TOKEN}$`));
  if(mm){
    const mapEntry = KEYWORD_LEAVE_MAP.find(k=> new RegExp('^(?:'+k.re+')$').test(mm[2]));
    const parsed = parseAmountToken(mm[3], mm[4]);
    if(!parsed || !mapEntry) return null;
    return { kind:'leave', leaveKey: mapEntry.key, leaveLabel: mapEntry.label, unit:parsed.unit, amount:parsed.amount, note:(mm[5]||'').trim() };
  }
  return null;
}

function parseKeywordLines(text, defaultCompType){
  const items = [];
  const unmatched = [];
  const rawLines = text.split('\n').map(l=>l.trim());
  const leaveKeywordPattern = KEYWORD_LEAVE_MAP.map(k=>k.re).join('|');

  rawLines.forEach(line=>{
    if(!line) return;
    if(/^(#|\/\/|、)/.test(line)) return; // 忽略註解／項目符號行

    let m;

    // A) 日期區間：M/D~M/D 或 M/D-M/D <內容> -> 展開成每天一筆
    m = line.match(/^(\S+)\s*[~～]\s*(\S+)\s+(.+)$/) || line.match(/^(\S+)-(\S+)\s+(.+)$/);
    if(m){
      const d1 = parseDateToken(m[1], selectedYear);
      const d2 = parseDateToken(m[2], selectedYear);
      if(d1 && d2){
        const built = kwBuildFromRest(m[3].trim(), defaultCompType, leaveKeywordPattern);
        if(built){
          let cur = d1, guard = 0;
          const endTime = new Date(d2+'T00:00:00').getTime();
          while(new Date(cur+'T00:00:00').getTime() <= endTime && guard < 62){
            items.push(Object.assign({}, built, { date: cur, raw: line }));
            cur = shiftDate(cur, 1);
            guard++;
          }
          return;
        }
      }
    }

    // B) 單一日期開頭：<日期> <其餘內容>
    m = line.match(/^(\S+)\s+(.+)$/);
    if(m){
      const d = parseDateToken(m[1], selectedYear);
      if(d){
        const built = kwBuildFromRest(m[2].trim(), defaultCompType, leaveKeywordPattern);
        if(built){ items.push(Object.assign({}, built, { date: d, raw: line })); return; }
      }
    }

    // C) 假別總天數設定：特休/年假/病假/事假/家庭照顧假/身心照顧假 [原]X [剩Y]
    m = line.match(new RegExp(`^(${leaveKeywordPattern})\\s*(?:原)?\\s*([\\d.]+)\\s*(?:剩\\s*([\\d.]+))?\\s*$`));
    if(m){
      const mapEntry = KEYWORD_LEAVE_MAP.find(k=> new RegExp('^(?:'+k.re+')$').test(m[1]));
      items.push({ kind:'quota', quotaKey: mapEntry.key, quotaLabel: mapEntry.label,
        total: parseFloat(m[2]), remain: m[3]!==undefined ? parseFloat(m[3]) : null, raw: line });
      return;
    }

    unmatched.push(line);
  });

  return { items, unmatched };
}

function compExpiryReminders(){
  if(compBalanceUpTo(CUR_YEAR) <= 0) return [];
  const todayD = new Date(TODAY);
  return state.compRecords.filter(r=>r.type==='earn' && r.expiry).map(r=>{
    const diffDays = Math.round((new Date(r.expiry) - todayD)/86400000);
    return Object.assign({}, r, {diffDays});
  }).filter(r=> r.diffDays <= 30).sort((a,b)=> a.diffDays-b.diffDays);
}

function reminderBanner(){
  const list = compExpiryReminders();
  if(list.length===0) return '';
  const items = list.map(r=>{
    const statusTxt = r.diffDays < 0 ? `已過期 ${Math.abs(r.diffDays)} 天` : (r.diffDays===0? '今天到期' : `${r.diffDays} 天後到期`);
    return `${toROC(r.date)} 獲得的 ${displayAmount(r)}補休，到期日 ${toROC(r.expiry)}（${statusTxt}）`;
  }).join('<br>');
  return `<div class="reminder-bar"><strong>⚠️ 補休到期提醒</strong>${items}</div>`;
}

function calendarPanel(){
  if(!calendarMode) return '';
  const y = calYear, m = calMonth;
  const firstDay = new Date(y, m-1, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const dayMap = {};
  const ymPrefix = `${y}-${String(m).padStart(2,'0')}`;
  LEAVE_TYPES.forEach(t=>{
    (state.records[t.key]||[]).forEach(r=>{
      if(r.date.startsWith(ymPrefix)){
        const d = parseInt(r.date.slice(8,10),10);
        if(!dayMap[d]) dayMap[d]=[];
        dayMap[d].push({seal:t.seal, c:t.c, label:`${t.label} ${displayAmount(r)}${r.note? '：'+r.note:''}`});
      }
    });
  });
  state.compRecords.forEach(r=>{
    if(r.date.startsWith(ymPrefix)){
      const d = parseInt(r.date.slice(8,10),10);
      if(!dayMap[d]) dayMap[d]=[];
      dayMap[d].push({seal:'補', c:'brick', label:`補休${r.type==='earn'?'獲得':'使用'} ${displayAmount(r)}${r.note? '：'+r.note:''}`});
    }
  });
  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const items = dayMap[d]||[];
    const dots = items.map(it=>`<span class="cal-dot c-${it.c}-bg" title="${escapeAttr(it.label)}">${it.seal}</span>`).join('');
    const isToday = (`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`===TODAY);
    cells += `<div class="cal-cell ${isToday?'today':''}"><div class="cal-daynum">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }
  return `
    <div class="block">
      <div class="cal-header">
        <button type="button" class="ghost" onclick="changeCalMonth(-1)">‹</button>
        <div class="cal-title">${y} 年 ${m} 月</div>
        <button type="button" class="ghost" onclick="changeCalMonth(1)">›</button>
      </div>
      <div class="cal-grid cal-weekdays"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}

function statsChart(){
  if(!chartMode) return '';
  const y = selectedYear;
  const monthTotals = Array(12).fill(0).map(()=> ({}));
  LEAVE_TYPES.forEach(t=>{
    (state.records[t.key]||[]).forEach(r=>{
      if(r.date.startsWith(String(y))){
        const mIdx = parseInt(r.date.slice(5,7),10)-1;
        monthTotals[mIdx][t.key] = (monthTotals[mIdx][t.key]||0) + toDays(r);
      }
    });
  });
  state.compRecords.filter(r=>r.type==='use' && r.date.startsWith(String(y))).forEach(r=>{
    const mIdx = parseInt(r.date.slice(5,7),10)-1;
    monthTotals[mIdx]['comp'] = (monthTotals[mIdx]['comp']||0) + toDays(r);
  });
  const maxVal = Math.max(1, ...monthTotals.map(m=> Object.values(m).reduce((s,v)=>s+v,0)));
  const TRACK_H = 130;
  const typeList = LEAVE_TYPES.concat([{key:'comp', c:'brick', label:'補休使用'}]);
  const bars = monthTotals.map((m,i)=>{
    const total = Object.values(m).reduce((s,v)=>s+v,0);
    const segments = typeList.map(t=>{
      const v = m[t.key]||0;
      if(v<=0) return '';
      const px = Math.max(2, Math.round(v/maxVal*TRACK_H));
      return `<div class="chart-seg c-${t.c}-bg" style="height:${px}px" title="${t.label} ${fmt(v)}天"></div>`;
    }).join('');
    return `<div class="chart-col">
      <div class="chart-bar-track">${segments}</div>
      <div class="chart-label">${i+1}月</div>
      <div class="chart-total">${total>0?fmt(total):''}</div>
    </div>`;
  }).join('');
  return `
    <div class="block">
      <h2><span class="dot dot-jade"></span>${y} 年度統計圖</h2>
      <div class="chart-wrap">${bars}</div>

function setStatus(msg, ok){
  const el = document.getElementById('statusMsg');
  if(!el) return;
  el.textContent = msg;
  el.className = 'status ' + (ok? 'ok':'err');
  setTimeout(()=>{ if(el){ el.textContent=''; el.className='status'; } }, 4000);
}

function setDays(id,val){ const el=document.getElementById(id); if(el) el.value = val; }

function toggleDateInputType(id){
  const el = document.getElementById(id);
  if(!el) return;
  if(el.type === 'date'){
    el.type = 'text';
    el.removeAttribute('pattern');
    el.placeholder = '例：7/23、115/7/23、2026-07-23';
    el.value = '';
    el.focus();
  } else {
    el.type = 'date';
  }
}

function onSearchInput(v){
  searchQuery = v;
  render();
  const el = document.getElementById('searchInput');
  if(el){ el.focus(); const p = el.value.length; try{ el.setSelectionRange(p,p); }catch(e){} }
}

function toggleSort(){ sortAsc = !sortAsc; render(); }

function changeYear(delta){ selectedYear += delta; render(); }

function toggleCalendar(){
  calendarMode = !calendarMode;
  if(calendarMode){ calYear = selectedYear; calMonth = (selectedYear===CUR_YEAR)? NOW.getMonth()+1 : 1; }
  render();
}
function changeCalMonth(delta){
  calMonth += delta;
  if(calMonth<1){ calMonth=12; calYear--; }
  if(calMonth>12){ calMonth=1; calYear++; }
  render();
}
function toggleChart(){ chartMode = !chartMode; render(); }

async function updateQuota(key){
  try{
    const v = parseFloat(document.getElementById(key+'TotalInput').value);
    if(isNaN(v) || v<0){ setStatus('請輸入有效的天數', false); return; }
    setQuota(key, selectedYear, v);
    await saveState();
    render();
    setStatus('已更新總天數', true);
  }catch(err){
    setStatus('更新失敗：' + (err && err.message ? err.message : String(err)), false);
    console.error(err);
  }
}

function onUnitChange(key){
  const unit = document.getElementById(key+'Unit').value;
  const dayQ = document.getElementById(key+'QuickDay');
  const hourQ = document.getElementById(key+'QuickHour');
  if(unit==='hour'){ dayQ.style.display='none'; hourQ.style.display='flex'; }
  else { dayQ.style.display='flex'; hourQ.style.display='none'; }
}

async function addRecord(key, e){
  e.preventDefault();
  try{
    const date = parseFlexibleDate(document.getElementById(key+'Date').value);
    const unit = document.getElementById(key+'Unit').value;
    const amount = parseFloat(document.getElementById(key+'Amount').value);
    const note = document.getElementById(key+'Note').value.trim();
    if(!date || isNaN(amount) || amount<=0){ setStatus('請填寫日期與數量', false); return; }
    const daysEquiv = unit==='hour' ? amount/HOURS_PER_DAY : amount;
    const currentRemain = remainOf(key, selectedYear);
    if(currentRemain - daysEquiv < 0){
      const label = (LEAVE_TYPES.find(t=>t.key===key)||{}).label || '';
      if(!window.confirm(`這筆會超過可用的${label}天數（目前剩餘 ${fmt(currentRemain)} 天 ≈ ${fmt(currentRemain*HOURS_PER_DAY)} 小時），仍要登記嗎？`)) return;
    }
    const id = uid();
    if(!state.records[key]) state.records[key]=[];
    state.records[key].push({ id, date, unit, amount, note });
    lastAddedId = id;
    await saveState();
    render();
    setStatus('已登記使用', true);
  }catch(err){
    setStatus('儲存失敗：' + (err && err.message ? err.message : String(err)), false);
    console.error(err);
  }
}

async function startEditRecord(key,id){ editing = {kind:'record', key, id}; render(); }
function cancelEdit(){ editing = null; render(); }

async function saveEditRecord(key,id){
  try{
    const date = parseFlexibleDate(document.getElementById(`editDate-${key}-${id}`).value);
    const amount = parseFloat(document.getElementById(`editAmount-${key}-${id}`).value);
    const unit = document.getElementById(`editUnit-${key}-${id}`).value;
    const note = document.getElementById(`editNote-${key}-${id}`).value.trim();
    if(!date || isNaN(amount) || amount<=0){ setStatus('請填寫正確的日期與數量', false); return; }
    const arr = state.records[key] || [];
    const idx = arr.findIndex(r=>r.id===id);
    if(idx>-1){
      const updated = Object.assign({}, arr[idx], {date, unit, amount, note});
      delete updated.days;
      arr[idx] = updated;
    }
    editing = null;
    await saveState();
    render();
    setStatus('已更新紀錄', true);
  }catch(err){
    setStatus('更新失敗：' + (err && err.message ? err.message : String(err)), false);
    console.error(err);
  }
}

function registerUndo(info){
  if(lastDeleted && lastDeleted.timeoutId) clearTimeout(lastDeleted.timeoutId);
  lastDeleted = info;
  lastDeleted.timeoutId = setTimeout(()=>{ lastDeleted=null; render(); }, 6000);
}

async function removeRecord(key, id){
  if(!window.confirm('確定要刪除這筆紀錄嗎？')) return;
  try{
    const arr = state.records[key] || [];
    const idx = arr.findIndex(r=>r.id===id);
    if(idx===-1) return;
    const item = arr[idx];
    arr.splice(idx,1);
    const label = (LEAVE_TYPES.find(t=>t.key===key)||{}).label || key;
    registerUndo({ kind:'record', key, item, index: idx, label: `${label} ${toROC(item.date)} ${displayAmount(item)}` });
    await saveState();
    render();
  }catch(err){
    setStatus('刪除失敗：' + (err && err.message ? err.message : String(err)), false);
  }
}

async function undoDelete(){
  if(!lastDeleted) return;
  clearTimeout(lastDeleted.timeoutId);
  if(lastDeleted.kind==='record'){
    if(!state.records[lastDeleted.key]) state.records[lastDeleted.key]=[];
    state.records[lastDeleted.key].splice(lastDeleted.index,0,lastDeleted.item);
  } else {
    state.compRecords.splice(lastDeleted.index,0,lastDeleted.item);
  }
  lastDeleted = null;
  await saveState();
  render();
}

function kwParseInput(){
  const text = document.getElementById('kwInputText').value;
  const defaultCompType = document.getElementById('kwDefaultCompType').value;
  if(!text || !text.trim()){ setStatus('請先貼上想登記的內容', false); return; }
  const { items, unmatched } = parseKeywordLines(text, defaultCompType);
  if(items.length===0){ setStatus('沒有辨識出可登記的資料，請確認格式', false); }
  else { setStatus(`辨識出 ${items.length} 筆，請確認後新增`, true); }
  kwPendingItems = items;
  kwUnmatchedLines = unmatched;
  render();
}

function kwClearInput(){

  kwPendingItems = [];
  kwUnmatchedLines = [];

}

function removeKwItem(idx){ kwPendingItems.splice(idx,1); render(); }
function cancelKwItems(){ kwPendingItems = []; kwUnmatchedLines = []; render(); }

async function applyKwItems(){
  const recordCount = kwPendingItems.filter(it=>it.kind!=='quota').length;
  const quotaItems = kwPendingItems.filter(it=>it.kind==='quota');
  let msg = `確定要新增這 ${kwPendingItems.length} 筆嗎？`;
  if(quotaItems.length>0){
    msg += `\n其中包含 ${quotaItems.length} 筆會直接覆蓋「總天數」設定：\n` +
      quotaItems.map(q=>`・${q.quotaLabel}總天數 → ${fmt(q.total)} 天`).join('\n');
  }
  if(!window.confirm(msg)) return;
  try{
    kwPendingItems.forEach(item=>{
      if(item.kind==='quota'){
        setQuota(item.quotaKey, selectedYear, item.total);
        return;
      }
      const id = uid();
      if(item.kind==='comp'){
        const rec = { id, type:item.compType, date:item.date, unit:item.unit, amount:Number(item.amount), note:item.note||'' };
        if(rec.type==='earn'){ rec.expiry = addYears(item.date, 2); }
        state.compRecords.push(rec);
      } else if(item.kind==='leave'){
        if(!state.records[item.leaveKey]) state.records[item.leaveKey]=[];
        state.records[item.leaveKey].push({ id, date:item.date, unit:item.unit, amount:Number(item.amount), note:item.note||'' });
      }
    });
    kwPendingItems = [];
    kwUnmatchedLines = [];
    await saveState();
    render();
    setStatus('已新增解析出的紀錄', true);
  }catch(err){
    setStatus('新增失敗：' + (err && err.message ? err.message : String(err)), false);
  }
}

async function resetRecords(scope, key){
  let matcher, scopeLabel;
  if(scope==='day'){
    const d = window.prompt('請輸入要清除的日期（格式 YYYY-MM-DD），例如 2026-07-23', TODAY);
    if(!d) return;
    if(!/^\d{4}-\d{1,2}-\d{1,2}$/.test(d.trim())){ alert('日期格式不對，請用 YYYY-MM-DD'); return; }
    const iso = parseFlexibleDate(d.trim());
    matcher = ds => ds===iso;
    scopeLabel = `${toROC(iso)} 當天`;
  } else if(scope==='month'){
    const input = window.prompt('請輸入要清除的年月（格式 YYYY-MM），例如 2026-07', `${selectedYear}-${String(NOW.getMonth()+1).padStart(2,'0')}`);
    if(!input) return;
    if(!/^\d{4}-\d{1,2}$/.test(input.trim())){ alert('格式不對，請用 YYYY-MM'); return; }
    const parts = input.trim().split('-');
    const norm = `${parts[0]}-${parts[1].padStart(2,'0')}`;
    matcher = ds => ds.startsWith(norm);
    scopeLabel = `${norm} 整月`;
  } else if(scope==='year'){
    const input = window.prompt('請輸入要清除的年度（西元），例如 2026', String(selectedYear));
    if(!input) return;
    if(!/^\d{4}$/.test(input.trim())){ alert('格式不對，請輸入 4 位數西元年'); return; }
    matcher = ds => ds.startsWith(input.trim());
    scopeLabel = `西元 ${input.trim()} 年全年`;
  } else {
    matcher = () => true;
    scopeLabel = '全部（不限日期）';
  }

  const keysToClear = key==='ALL' ? LEAVE_TYPES.map(t=>t.key).concat(['comp']) : [key];
  let count = 0;
  keysToClear.forEach(k=>{
    if(k==='comp'){ count += state.compRecords.filter(r=>matcher(r.date)).length; }
    else { count += (state.records[k]||[]).filter(r=>matcher(r.date)).length; }
  });

  if(count===0){ setStatus('這個範圍內沒有符合的紀錄', false); return; }

  const targetLabel = key==='ALL' ? '所有假別（含補休）' : (key==='comp' ? '補休' : ((LEAVE_TYPES.find(t=>t.key===key)||{}).label||key));
  if(!window.confirm(`確定要清除「${targetLabel}」在 ${scopeLabel} 的 ${count} 筆紀錄嗎？\n此動作會直接刪除，沒有復原按鈕。`)) return;

  keysToClear.forEach(k=>{
    if(k==='comp'){ state.compRecords = state.compRecords.filter(r=>!matcher(r.date)); }
    else { state.records[k] = (state.records[k]||[]).filter(r=>!matcher(r.date)); }
  });

  await saveState();
  render();
  setStatus(`已清除 ${count} 筆紀錄`, true);
}

async function addComp(e){
  e.preventDefault();
  try{
    const type = document.getElementById('compType').value;
    const date = parseFlexibleDate(document.getElementById('compDate').value);
    const unit = document.getElementById('compUnit').value;
    const amount = parseFloat(document.getElementById('compAmount').value);
    const expiry = parseFlexibleDate(document.getElementById('compExpiry').value) || null;
    const note = document.getElementById('compNote').value.trim();
    if(!date || isNaN(amount) || amount<=0){ setStatus('請填寫日期與數量', false); return; }
    const daysEquiv = unit==='hour' ? amount/HOURS_PER_DAY : amount;
    if(type==='use'){
      const currentBal = compBalanceUpTo(selectedYear);
      if(currentBal - daysEquiv < 0){
        if(!window.confirm(`這筆會超過可用的補休（目前結餘 ${fmt(currentBal)} 天 ≈ ${fmt(currentBal*HOURS_PER_DAY)} 小時），仍要登記嗎？`)) return;
      }
    }
    const id = uid();
    const record = { id, type, date, unit, amount, note };
    if(type==='earn' && expiry) record.expiry = expiry;
    state.compRecords.push(record);
    lastAddedId = id;
    await saveState();
    render();
    setStatus('已登記補休', true);
  }catch(err){
    setStatus('儲存失敗：' + (err && err.message ? err.message : String(err)), false);
    console.error(err);
  }
}

function buildFullReportText(){
  const lines = [];
  const now = new Date();
  const stamp = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  lines.push('📒 假期存摺完整紀錄');
  lines.push('匯出時間：'+stamp);
  lines.push('（含所有年度、所有假別、所有筆數，僅供閱讀與存檔，無法用來還原資料）');
  lines.push('');

  LEAVE_TYPES.forEach(t=>{
    lines.push(`■ ${t.label}`);
    const years = Object.keys(state.quotaByYear).filter(y=> state.quotaByYear[y][t.key]!==undefined).sort();
    if(years.length){
      years.forEach(y=> lines.push(`　${y} 年總天數：${fmt(state.quotaByYear[y][t.key])} 天`));
    }
    const recs = (state.records[t.key]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    if(recs.length===0){ lines.push('　（無使用紀錄）'); }
    else { recs.forEach(r=> lines.push(`　${toROC(r.date)}　用 ${displayAmount(r)}${r.note? '　'+r.note:''}`)); }
    lines.push('');
  });

  lines.push('■ 補休');
  const compRecs = state.compRecords.slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(compRecs.length===0){ lines.push('　（無紀錄）'); }
  else {
    compRecs.forEach(r=>{
      let line = `　${toROC(r.date)}　${r.type==='earn'?'獲得':'使用'} ${displayAmount(r)}`;
      if(r.note) line += '　'+r.note;
      if(r.expiry) line += `　（到期：${toROC(r.expiry)}）`;
      lines.push(line);
    });
  }
  lines.push('');
  lines.push(`目前補休結餘：${fmt(compBalanceUpTo(CUR_YEAR))} 天（≈ ${fmt(compBalanceUpTo(CUR_YEAR)*HOURS_PER_DAY)} 小時）`);

  return lines.join('\n');
}

async function copyFullReport(){
  const text = buildFullReportText();
  try{
    await navigator.clipboard.writeText(text);
    setStatus('已複製完整文字紀錄', true);
  }catch(err){
    document.getElementById('fullReportText').value = text;
    document.getElementById('fullReportArea').style.display = 'block';
    setStatus('請手動選取下方文字並複製', false);

}

function downloadFullReport(){
  try{
    const text = buildFullReportText();
    const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    const stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
    a.href = url; a.download = `假期存摺完整紀錄-${stamp}.txt`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setStatus('已下載完整報表', true);
  }catch(e){ setStatus('下載失敗，請改用「複製完整文字」', false); }
}

function buildSummaryText(){
  const lines = [];
  const now = new Date();
  const stamp = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  lines.push('📒 假期存摺摘要');
  lines.push('更新時間：'+stamp);
  lines.push('');
  LEAVE_TYPES.forEach(t=>{
    lines.push(`${t.label}：剩餘 ${fmt(remainOf(t.key, CUR_YEAR))} 天（共 ${fmt(getQuota(t.key, CUR_YEAR))} 天）`);
  });
  lines.push(`補休：結餘 ${fmt(compBalanceUpTo(CUR_YEAR))} 天（≈ ${fmt(compBalanceUpTo(CUR_YEAR)*HOURS_PER_DAY)} 小時）`);
  lines.push('');
  lines.push('最近紀錄：');
  const combined = [];
  LEAVE_TYPES.forEach(t=>{
    (state.records[t.key]||[]).forEach(r=> combined.push({date:r.date, text:`${t.label} 用 ${displayAmount(r)}${r.note? '　'+r.note:''}`}));
  });
  state.compRecords.forEach(r=> combined.push({date:r.date, text:`補休 ${r.type==='earn'?'獲得':'使用'} ${displayAmount(r)}${r.note? '　'+r.note:''}`}));
  combined.sort((a,b)=> b.date.localeCompare(a.date));
  if(combined.length===0){ lines.push('（尚無紀錄）'); }
  else { combined.slice(0,10).forEach(c=> lines.push(`${toROC(c.date)}　${c.text}`)); }
  return lines.join('\n');
}

async function shareSummary(){
  const text = buildSummaryText();
  if(navigator.share){
    try{
      await navigator.share({ text });
      setStatus('已開啟分享選單', true);
      return;
    }catch(e){
      if(e && e.name === 'AbortError'){ return; }
    }
  }
  try{
    await navigator.clipboard.writeText(text);
    setStatus('此環境不支援分享選單，已複製摘要文字，可貼到備忘錄', true);
  }catch(err){
    document.getElementById('summaryText').value = text;
    document.getElementById('summaryArea').style.display = 'block';
    setStatus('請手動選取下方文字並複製', false);
  }
}

async function restoreBackup(){
  const raw = document.getElementById('importText').value.trim();
  if(!raw){ setStatus('請先貼上備份內容', false); return; }
  try{
    const parsed = JSON.parse(raw);
    if(!parsed.records){ throw new Error('格式不符'); }
    state = Object.assign(defaultState(), parsed);
    lastDeleted = null; editing = null; searchQuery=''; sortAsc=false; expandedMonths={};
    selectedYear = CUR_YEAR; calendarMode=false; chartMode=false;
    await saveState();
    render();
    setStatus('已還原備份資料', true);
  }catch(e){ setStatus('還原失敗，請確認貼上的內容是完整的備份 JSON', false); }
}
